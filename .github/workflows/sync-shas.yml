name: Sync plugin SHAs

on:
  # Auto-sync on every push to main (ignores marketplace.json-only commits to avoid loops)
  push:
    branches: [main]
    paths-ignore:
      - ".claude-plugin/marketplace.json"
  # Manual trigger to resync all shas at once
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Sync SHAs
        run: bun .github/scripts/sync-shas.js
        env:
          GH_TOKEN: ${{ github.token }}
          # Set by repository_dispatch payload, empty on manual run
          UPDATED_PLUGIN: ${{ github.event.client_payload.plugin }}
          UPDATED_SHA: ${{ github.event.client_payload.sha }}

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet && echo "No changes" && exit 0
          git add .claude-plugin/marketplace.json
          git commit -m "chore: bump ${{ github.event.client_payload.plugin || 'all plugins' }} sha"
          git push
